<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Seoul Map</title>

  <!-- Leaflet CSS: styles for the map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Firebase SDK (compat version — works directly in the browser with script tags) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <!-- Cropper.js — photo crop/resize -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" />

  <!-- Our own styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== TOP BAR ===== -->
  <div id="topbar">
    <h1>
      <svg width="30" height="38" viewBox="-1 -1 18 23" fill="none" stroke="#4a3430" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:8px;margin-bottom:3px">
        <path d="M8 20 C8 20 1 12 1 7 a7 7 0 0 1 14 0 C15 12 8 20 8 20 Z"/>
        <circle cx="8" cy="7" r="2.2"/>
      </svg>
      My Seoul Map
    </h1>

    <!-- Profile button in the top-right corner -->
    <button id="btn-profile" title="My Profile">
      <!-- Photo shown when user has uploaded one, SVG shown as fallback -->
      <img id="topbar-avatar" class="hidden" alt="Profile" />
      <svg id="topbar-avatar-default" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      <span id="profile-username"></span>
    </button>
  </div>

  <!-- ===== MAIN LAYOUT: sidebar + map ===== -->
  <div id="layout">

    <!-- LEFT SIDEBAR: list of saved places -->
    <div id="sidebar">

      <!-- Tab switcher: My Places | Friends -->
      <div id="sidebar-tabs">
        <button class="tab-btn active" id="tab-btn-places">My Places</button>
        <button class="tab-btn" id="tab-btn-friends">
          Friends
          <span id="requests-badge" class="hidden"></span>
        </button>
      </div>

      <!-- MY PLACES tab -->
      <div id="tab-places">
        <!-- Filter buttons — generated by JS -->
        <div id="filters"></div>
        <!-- The list of places will be injected here by JavaScript -->
        <ul id="place-list"></ul>
      </div>

      <!-- FRIENDS tab -->
      <div id="tab-friends" class="hidden">

        <!-- Search for users by name -->
        <div id="friend-search-wrap">
          <input type="text" id="friend-search-input" placeholder="Search people by name..." autocomplete="off" />
          <ul id="friend-search-results" class="hidden"></ul>
        </div>

        <!-- Incoming friend requests (hidden when empty) -->
        <div id="friend-requests-section" class="hidden">
          <h3 class="friends-section-title">Friend Requests</h3>
          <ul id="friend-requests-list"></ul>
        </div>

        <!-- Friends list -->
        <div id="friends-list-section">
          <h3 class="friends-section-title">My Friends</h3>
          <ul id="friends-list"></ul>
        </div>

      </div>
    </div>

    <!-- RIGHT SIDE: the map -->
    <div id="map">

      <!-- SEARCH BAR: floats on top of the map -->
      <div id="search-container">
        <!-- Hand-drawn magnifying glass icon, sits on top of the input -->
        <svg id="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#b8afa8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="10" cy="10" r="7"/>
          <line x1="15.5" y1="15.5" x2="22" y2="22"/>
        </svg>
        <input
          type="text"
          id="search-input"
          placeholder="Search a place in Seoul..."
          autocomplete="off"
        />
        <!-- Dropdown results appear here -->
        <ul id="search-results" class="hidden"></ul>
      </div>

      <!-- Banner shown when viewing a friend's map -->
      <div id="friend-view-banner" class="hidden">
        <span id="friend-view-name"></span>
        <button id="btn-back-to-my-map">← My Map</button>
      </div>

    </div>
  </div>

  <!-- ===== POPUP MODAL: shown when you click the map to add a new place ===== -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <h2 id="modal-title">Add a New Place</h2>

      <label>Name of Place</label>
      <input type="text" id="input-name" placeholder="e.g. Myeongdong Dakgalbi" />

      <label>Category</label>
      <select id="input-category">
        <option value="Restaurant">Restaurant</option>
        <option value="Cafe">Cafe</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Shop">Shop</option>
        <option value="Other">Other</option>
      </select>

      <label>Date Visited</label>
      <input type="date" id="input-date" />

      <label>Notes (what did you do / eat / think?)</label>
      <textarea id="input-notes" placeholder="Write your memories here..."></textarea>

      <div id="modal-buttons">
        <button id="btn-save">Save Place</button>
        <button id="btn-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ===== DETAIL MODAL: shown when you click an existing marker ===== -->
  <div id="detail-overlay" class="hidden">
    <div id="detail-modal">
      <h2 id="detail-name"></h2>
      <p id="detail-category"></p>
      <p id="detail-date"></p>
      <p id="detail-notes"></p>
      <div id="modal-buttons">
        <button id="btn-delete">Delete</button>
        <button id="btn-edit-place">Edit</button>
        <button id="btn-close-detail">Close</button>
      </div>
    </div>
  </div>

  <!-- ===== PHOTO CROP MODAL ===== -->
  <div id="crop-modal-overlay" class="hidden">
    <div id="crop-modal">
      <h3>Adjust your photo</h3>
      <p class="crop-hint">Drag to reposition · Scroll to zoom</p>
      <div id="crop-container">
        <img id="crop-image" alt="Crop preview" />
      </div>
      <div id="crop-buttons">
        <button id="btn-crop-confirm">Use Photo</button>
        <button id="btn-crop-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ===== SIGN-IN SCREEN (shown when not logged in) ===== -->
  <div id="signin-screen">
    <div id="signin-card">
      <svg width="36" height="46" viewBox="0 0 16 21" fill="none" stroke="#c9a99a" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 20 C8 20 1 12 1 7 a7 7 0 0 1 14 0 C15 12 8 20 8 20 Z"/>
        <circle cx="8" cy="7" r="2.2"/>
      </svg>
      <h1>My Seoul Map</h1>
      <p>Your personal little diary of Seoul</p>
      <button id="btn-google-signin">
        <!-- Google "G" logo -->
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Sign in with Google
      </button>
    </div>
  </div>

  <!-- ===== PROFILE PAGE OVERLAY ===== -->
  <div id="profile-overlay" class="hidden">
    <div id="profile-panel">

      <!-- Panel title — spans both columns via CSS -->
      <h2 id="profile-panel-title">My Profile</h2>

      <!-- Close button -->
      <button id="btn-close-profile">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>

      <!-- ── Photo ── -->
      <div id="profile-photo-wrap">
        <!-- The photo or default avatar is shown here -->
        <div id="profile-photo-display">
          <!-- Default hand-drawn person icon shown before a photo is uploaded -->
          <svg id="default-avatar" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#c9a99a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          <img id="profile-photo-img" class="hidden" alt="Profile photo"/>
        </div>
        <!-- Hidden file input triggered by clicking the button -->
        <input type="file" id="photo-upload" accept="image/*" class="hidden"/>
        <button id="btn-change-photo">Change Photo</button>
      </div>

      <!-- ── Name & Bio ── -->
      <div id="profile-fields">
        <label>Name</label>
        <input type="text" id="profile-name" placeholder="Your name" />

        <label>Bio</label>
        <textarea id="profile-bio" placeholder="A little about yourself..."></textarea>
      </div>

      <!-- ── Stats ── -->
      <div id="profile-stats">
        <h3>My Stats</h3>
        <div id="stats-total"></div>
        <div id="stats-breakdown"></div>
        <div id="stats-favorite"></div>
      </div>

      <button id="btn-save-profile">Save Profile</button>
      <button id="btn-signout">Sign Out</button>

    </div>
  </div>

  <!-- Cropper.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

  <!-- Leaflet JavaScript: the map library -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Our own app logic -->
  <script src="app.js"></script>

</body>
</html>
